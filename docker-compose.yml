version: '3.8'

services:
  # Spring Boot Application - mysawit-harvest microservice
  # Note: Database is managed by mysawit-infra (shared PostgreSQL instance)
  mysawit-harvest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mysawit-harvest-app
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Connect to shared infra PostgreSQL (mysawit-infra)
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5435/mysawit_harvest
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8083:8080"  # Port 8083 untuk harvest service
    volumes:
      - ./uploads/harvests:/app/uploads/harvests

networks:
  mysawit-network:
    driver: bridge
