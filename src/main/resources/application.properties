spring.application.name=mysawit-harvest

server.port=8083

# === Shared Infrastructure Pattern ===
# This microservice connects to shared PostgreSQL instance via mysawit-infra
# 
# Profile Configurations:
# - dev: Development profile with PostgreSQL (application-dev.properties)
# - prod: Production profile with environment variables (application-prod.properties)
#
# To activate a profile:
#   - Set environment variable: SPRING_PROFILES_ACTIVE=dev
#   - Or run: java -jar app.jar --spring.profiles.active=dev
#
# Default fallback configuration (H2 in-memory for quick start)
spring.datasource.url=jdbc:postgresql://localhost:5435/mysawit_harvest
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# File storage location for harvest photos
storage.harvest.dir=uploads/harvests

# Default logging level
logging.level.root=INFO
logging.level.id.ac.ui.cs.advprog=INFO
