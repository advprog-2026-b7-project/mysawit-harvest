# Production Configuration - mysawit-harvest Service
spring.application.name=mysawit-harvest
spring.profiles.active=prod

# PostgreSQL Database Configuration (Production)
# This service connects to shared infra PostgreSQL instance - credentials from environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/mysawit_harvest}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT validation
jwt.secret=${JWT_SECRET:dev-local-secret-for-harvest-change-me!!}

# File storage location for harvest photos
storage.harvest.dir=${STORAGE_DIR:/opt/harvest/uploads}

# Logging
logging.level.root=WARN
logging.level.id.ac.ui.cs.advprog=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Server Configuration
server.port=8080
server.servlet.context-path=/api/harvest
