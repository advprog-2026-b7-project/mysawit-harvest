# Development Configuration - mysawit-harvest Service
spring.application.name=mysawit-harvest
server.port=8083

# PostgreSQL Database Configuration (Development)
# This service connects to the shared infra PostgreSQL instance
spring.datasource.url=jdbc:postgresql://localhost:5435/mysawit_harvest
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Jakarta

# Flyway migration for deterministic schema management
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT validation
jwt.secret=${JWT_SECRET:dev-local-secret-for-harvest-change-me!!}

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# File storage location for harvest photos
storage.harvest.dir=uploads/harvests

# Logging
logging.level.root=INFO
logging.level.id.ac.ui.cs.advprog=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO
