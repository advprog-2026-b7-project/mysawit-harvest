spring.datasource.url=jdbc:h2:mem:mysawit_harvest_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Jakarta

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET:test-local-secret-for-harvest-change-me!!}

storage.harvest.dir=${java.io.tmpdir}/mysawit-harvest-test/uploads
storage.harvest.public-base-url=http://localhost:8083

logging.level.root=WARN
logging.level.id.ac.ui.cs.advprog=INFO
